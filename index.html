<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wonder Trails</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/canvas.css" />
    <link rel="stylesheet" href="styles/ui.css" />
    <link rel="stylesheet" href="styles/responsive.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="ui-bar">
      <button id="fullscreen-btn">Fullscreen</button>
      <input id="bg-picker" type="color" value="#000000" />
    </div>

    <div id="effect-picker">
      <button data-effect="stars">⭐</button>
      <button data-effect="paint">🎨</button>
      <button data-effect="bubbles">🫧</button>
      <button data-effect="fireworks">🎆</button>
    </div>

    <script src="scripts/pointer.js"></script>
    <script src="scripts/effects/effect-manager.js"></script>

    <script src="scripts/effects/stars.js"></script>
    <script src="scripts/effects/paint.js"></script>
    <script src="scripts/effects/bubbles.js"></script>
    <script src="scripts/effects/fireworks.js"></script>

    <script src="scripts/main.js"></script>
  </body>
</html>
